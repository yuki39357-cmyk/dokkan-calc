<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドッカンバトル 計算機</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f0f0f0;
      color: #222;
      font-size: 13px;
      padding: 5px;
    }
    h1 { text-align: center; font-size: 0.95em; padding: 3px 0 5px; color: #c00; font-weight: bold; }
    .container { max-width: 480px; margin: 0 auto; }

    section {
      background: #fff;
      border-radius: 5px;
      padding: 4px 7px 5px;
      margin-bottom: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }
    h2 {
      font-size: 0.75em; font-weight: bold;
      margin-bottom: 3px; padding-bottom: 2px;
      border-bottom: 1.5px solid #e0e0e0; color: #333;
    }
    .sep { border: none; border-top: 1px dashed #ddd; margin: 3px 0 3px; }

    .col-hd {
      display: grid;
      grid-template-columns: 1fr 56px 56px;
      gap: 3px;
      font-size: 0.63em;
      color: #aaa;
      text-align: center;
      margin-bottom: 1px;
    }
    .col-hd span:first-child { text-align: left; }

    .r2 {
      display: grid;
      grid-template-columns: 1fr 56px 56px;
      align-items: center;
      gap: 3px;
      margin-bottom: 2px;
    }
    .r1 {
      display: grid;
      grid-template-columns: 1fr 56px;
      align-items: center;
      gap: 3px;
      margin-bottom: 2px;
    }
    .r2 label, .r1 label {
      font-size: 0.76em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    input[type="number"], select {
      width: 100%;
      padding: 2px 3px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: 0.8em;
      text-align: center;
      background: #fff;
      appearance: none;
      -webkit-appearance: none;
    }
    input[type="number"] { text-align: right; }
    select { cursor: pointer; }

    .no-def {
      border: 1px solid #eee;
      border-radius: 3px;
      background: #fafafa;
      color: #ccc;
      font-size: 0.75em;
      text-align: center;
      padding: 2px 0;
    }

    .col-hd-eff {
      display: grid;
      grid-template-columns: 14px 44px 11px 30px 44px;
      gap: 3px;
      font-size: 0.63em;
      color: #aaa;
      text-align: center;
      margin-bottom: 1px;
    }
    .r-eff {
      display: grid;
      grid-template-columns: 14px 44px 11px 30px 44px;
      align-items: center;
      gap: 3px;
      margin-bottom: 2px;
    }
    .r-eff label { font-size: 0.76em; text-align: center; }
    .x-mark { text-align: center; font-size: 0.76em; color: #aaa; }

    .btn-row { display: flex; gap: 6px; margin-bottom: 5px; }
    button#calcBtn {
      flex: 1; padding: 9px;
      background: #c00; color: #fff; border: none;
      border-radius: 5px; font-size: 0.95em; font-weight: bold;
      cursor: pointer;
    }
    button#calcBtn:active { background: #a00; }
    button#resetBtn {
      padding: 9px 12px;
      background: #888; color: #fff; border: none;
      border-radius: 5px; font-size: 0.85em; font-weight: bold;
      cursor: pointer; white-space: nowrap;
    }
    button#resetBtn:active { background: #555; }

    #result { background: #fff; border-radius: 5px; padding: 5px 7px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    #result h2 { color: #c00; border-bottom-color: #fcc; }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 4px; }
    .result-item { background: #f9f9f9; border-radius: 4px; padding: 4px 6px; }
    .result-label { font-size: 0.65em; color: #777; margin-bottom: 1px; }
    .result-value { font-size: 1.15em; font-weight: bold; }
    .result-value.atk { color: #c00; }
    .result-value.def { color: #006cc7; }
  </style>
</head>
<body>
<div class="container">
  <h1>ドッカンバトル 計算機</h1>

  <!-- 基礎 + リーダー -->
  <section>
    <h2>基礎ステータス・リーダースキル %</h2>
    <div class="col-hd"><span></span><span>ATK</span><span>DEF</span></div>
    <div class="r2"><label>基礎</label>
      <input type="number" id="baseAtk" value="0" min="0">
      <input type="number" id="baseDef" value="0" min="0">
    </div>
    <div class="r2"><label>潜在</label>
      <input type="number" id="potAtk" value="0" min="0">
      <input type="number" id="potDef" value="0" min="0">
    </div>
    <div class="r2"><label>スキル玉 %</label>
      <input type="number" id="ballAtk" value="0" min="0">
      <input type="number" id="ballDef" value="0" min="0">
    </div>
    <hr class="sep">
    <div class="r2"><label>自リーダー</label>
      <select id="leaderAtk"><option value="220" selected>220</option><option value="200">200</option><option value="170">170</option></select>
      <select id="leaderDef"><option value="220" selected>220</option><option value="200">200</option><option value="170">170</option></select>
    </div>
    <div class="r2"><label>フレンド</label>
      <select id="friendAtk"><option value="220" selected>220</option><option value="200">200</option><option value="170">170</option></select>
      <select id="friendDef"><option value="220" selected>220</option><option value="200">200</option><option value="170">170</option></select>
    </div>
  </section>

  <!-- パッシブ -->
  <section>
    <h2>パッシブ %</h2>
    <div class="col-hd"><span></span><span>ATK</span><span>DEF</span></div>
    <div class="r2"><label>A①</label>
      <input type="number" id="passA1Atk" value="0">
      <input type="number" id="passA1Def" value="0">
    </div>
    <div class="r2"><label>A②</label>
      <input type="number" id="passA2Atk" value="0">
      <input type="number" id="passA2Def" value="0">
    </div>
    <div class="r2"><label>サポート</label>
      <input type="number" id="suppAtk" value="0">
      <input type="number" id="suppDef" value="0">
    </div>
    <hr class="sep">
    <div class="r2"><label>被弾時</label>
      <input type="number" id="hitAtk" value="0">
      <input type="number" id="hitDef" value="0">
    </div>
    <div class="r2"><label>B①</label>
      <input type="number" id="passBAtk1" value="0">
      <input type="number" id="passBDef1" value="0">
    </div>
    <div class="r2"><label>B②</label>
      <input type="number" id="passBAtk2" value="0">
      <input type="number" id="passBDef2" value="0">
    </div>
  </section>

  <!-- その他補正 -->
  <section>
    <h2>その他補正 %</h2>
    <div class="col-hd"><span></span><span>ATK</span><span>DEF</span></div>
    <div class="r2"><label>リンク</label>
      <input type="number" id="linkAtk" value="0">
      <input type="number" id="linkDef" value="0">
    </div>
    <div class="r2"><label>アクティブ</label>
      <input type="number" id="activeAtk" value="0">
      <input type="number" id="activeDef" value="0">
    </div>
    <div class="r2"><label>フィールド</label>
      <input type="number" id="fieldAtk" value="0">
      <input type="number" id="fieldDef" value="0">
    </div>
    <div class="r2"><label>Sメモリー</label>
      <input type="number" id="memAtk" value="0">
      <input type="number" id="memDef" value="0">
    </div>
    <div class="r2"><label>アイテム</label>
      <input type="number" id="itemAtk" value="0">
      <input type="number" id="itemDef" value="0">
    </div>
  </section>

  <!-- 必殺技 + DEF関連 -->
  <section>
    <h2>必殺技・DEF関連</h2>
    <div class="r1"><label>気力補正</label>
      <select id="kiBonus">
        <option value="2" selected>×2.0</option>
        <option value="1.8">×1.8</option>
        <option value="1.7">×1.7</option>
        <option value="1.6">×1.6</option>
        <option value="1.5">×1.5</option>
      </select>
    </div>
    <div class="r1"><label>必殺技倍率</label>
      <select id="suprRate">
        <option value="8.4">8.4 究極lv20</option>
        <option value="6.3">6.3 超絶特大lv15</option>
        <option value="6.2">6.2 超極大lv25</option>
        <option value="5.7" selected>5.7 超極大lv20</option>
        <option value="5.05">5.05 超絶特大lv10</option>
        <option value="4.5">4.5 極大lv25</option>
        <option value="4.25">4.25 極大lv20</option>
      </select>
    </div>
    <hr class="sep">
    <div class="col-hd-eff"><span></span><span>ATK%</span><span></span><span>回数</span><span>DEF%</span></div>
    <div class="r-eff">
      <label>①</label>
      <input type="number" id="suprEff1Pct" value="0" min="0">
      <span class="x-mark">×</span>
      <input type="number" id="suprEff1Cnt" value="1" min="0">
      <input type="number" id="suprEff1DefPct" value="0" min="0">
    </div>
    <div class="r-eff">
      <label>②</label>
      <input type="number" id="suprEff2Pct" value="0" min="0">
      <span class="x-mark">×</span>
      <input type="number" id="suprEff2Cnt" value="1" min="0">
      <input type="number" id="suprEff2DefPct" value="0" min="0">
    </div>
    <div class="r-eff">
      <label>③</label>
      <input type="number" id="suprEff3Pct" value="0" min="0">
      <span class="x-mark" style="visibility:hidden">×</span>
      <span class="no-def">—</span>
      <input type="number" id="suprEff3DefPct" value="0" min="0">
    </div>
    <div class="r1"><label>必殺技威力 %</label>
      <input type="number" id="suprPower" value="0">
    </div>
    <hr class="sep">
    <div class="r1"><label>軽減率 %</label>
      <input type="number" id="mitigation" value="0" min="0" max="100">
    </div>
    <div class="r1"><label>全属性ガード %</label>
      <input type="number" id="allGuard" value="0" min="0">
    </div>
  </section>

  <div class="btn-row">
    <button id="calcBtn" onclick="calc()">計算する</button>
    <button id="resetBtn" onclick="resetAll()">リセット</button>
  </div>

  <div id="result">
    <h2>計算結果</h2>
    <div class="result-grid">
      <div class="result-item">
        <div class="result-label">必殺技ATK</div>
        <div class="result-value atk" id="resSuprAtk">---</div>
      </div>
      <div class="result-item">
        <div class="result-label">完封ライン</div>
        <div class="result-value def" id="resSealLine">---</div>
      </div>
      <div class="result-item">
        <div class="result-label">行動前DEF</div>
        <div class="result-value def" id="resEffDef">---</div>
      </div>
      <div class="result-item">
        <div class="result-label">行動後DEF</div>
        <div class="result-value def" id="resAftDef">---</div>
      </div>
    </div>
  </div>

</div>

<script>
  function n(id) {
    return parseFloat(document.getElementById(id).value) || 0;
  }
  function fmt(num) {
    return Math.floor(num).toLocaleString('ja-JP');
  }

  const INPUT_IDS = [
    'baseAtk','baseDef','potAtk','potDef','ballAtk','ballDef',
    'leaderAtk','leaderDef','friendAtk','friendDef',
    'passA1Atk','passA1Def','passA2Atk','passA2Def','suppAtk','suppDef',
    'hitAtk','hitDef','passBAtk1','passBDef1','passBAtk2','passBDef2',
    'linkAtk','linkDef','activeAtk','activeDef',
    'fieldAtk','fieldDef','memAtk','memDef','itemAtk','itemDef',
    'kiBonus','suprRate',
    'suprEff1Pct','suprEff1Cnt','suprEff1DefPct',
    'suprEff2Pct','suprEff2Cnt','suprEff2DefPct',
    'suprEff3Pct','suprEff3DefPct',
    'suprPower',
    'mitigation','allGuard'
  ];

  function saveAll() {
    const data = {};
    INPUT_IDS.forEach(id => { data[id] = document.getElementById(id).value; });
    localStorage.setItem('dokkanCalc', JSON.stringify(data));
  }

  function loadAll() {
    try {
      const saved = localStorage.getItem('dokkanCalc');
      if (!saved) return;
      const data = JSON.parse(saved);
      INPUT_IDS.forEach(id => {
        if (data[id] !== undefined) document.getElementById(id).value = data[id];
      });
    } catch(e) {}
  }

  INPUT_IDS.forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input',  saveAll);
    el.addEventListener('change', saveAll);
  });

  function calc() {
    const baseAtk = n('baseAtk') + n('potAtk') + n('baseAtk') * n('ballAtk') / 100;
    const baseDef  = n('baseDef')  + n('potDef')  + n('baseDef')  * n('ballDef')  / 100;

    const leaderAtkMult = 1 + n('leaderAtk') / 100 + n('friendAtk') / 100;
    const leaderDefMult = 1 + n('leaderDef') / 100 + n('friendDef') / 100;

    const passAAtkMult = 1 + n('passA1Atk') / 100 + n('passA2Atk') / 100 + n('suppAtk') / 100;
    const passADefMult = 1 + n('passA1Def') / 100 + n('passA2Def') / 100 + n('suppDef') / 100;

    const passBAllAtkMult = 1 + n('hitAtk') / 100 + n('passBAtk1') / 100 + n('passBAtk2') / 100;
    const passBHitDefMult = 1 + n('hitDef') / 100;
    const passBAllDefMult = 1 + n('hitDef') / 100 + n('passBDef1') / 100 + n('passBDef2') / 100;

    const otherAtkMult = (1 + n('linkAtk')  / 100)
                       * (1 + n('activeAtk') / 100)
                       * (1 + n('fieldAtk')  / 100)
                       * (1 + n('memAtk')    / 100)
                       * (1 + n('itemAtk')   / 100);

    const otherDefMult = (1 + n('linkDef')  / 100)
                       * (1 + n('activeDef') / 100)
                       * (1 + n('fieldDef')  / 100)
                       * (1 + n('memDef')    / 100)
                       * (1 + n('itemDef')   / 100);

    const kiBonusMult = parseFloat(document.getElementById('kiBonus').value) || 1;
    const effAtkTotal = n('suprEff1Pct') * n('suprEff1Cnt')
                      + n('suprEff2Pct') * n('suprEff2Cnt')
                      + n('suprEff3Pct');
    const suprRate    = parseFloat(document.getElementById('suprRate').value) || 1;
    const suprFinalMult = suprRate + (effAtkTotal + n('suprPower')) / 100;

    const suprAtk = baseAtk
      * leaderAtkMult * passAAtkMult * passBAllAtkMult
      * otherAtkMult * kiBonusMult * suprFinalMult;

    const effDef12 = n('suprEff1DefPct') * n('suprEff1Cnt')
                   + n('suprEff2DefPct') * n('suprEff2Cnt');
    const effDef123 = effDef12 + n('suprEff3DefPct');

    const effDef = baseDef
      * leaderDefMult * passADefMult * passBHitDefMult
      * otherDefMult * (1 + effDef12 / 100);

    const aftDef = baseDef
      * leaderDefMult * passADefMult * passBAllDefMult
      * otherDefMult * (1 + effDef123 / 100);

    const defWithGuard = aftDef * (1 + n('allGuard') / 100);
    const mit = n('mitigation');
    const sealLine = mit < 100 ? defWithGuard / (1 - mit / 100) : Infinity;

    document.getElementById('resSuprAtk').textContent  = fmt(suprAtk);
    document.getElementById('resEffDef').textContent   = fmt(effDef);
    document.getElementById('resAftDef').textContent   = fmt(aftDef);
    document.getElementById('resSealLine').textContent = sealLine === Infinity ? '∞' : fmt(sealLine);
  }

  const DEFAULTS = { suprRate: '5.7', kiBonus: '2', leaderAtk: '220', leaderDef: '220', friendAtk: '220', friendDef: '220', suprEff1Cnt: '1', suprEff2Cnt: '1' };

  function resetAll() {
    if (!confirm('すべての入力値をリセットしますか？')) return;
    INPUT_IDS.forEach(id => {
      document.getElementById(id).value = DEFAULTS[id] ?? '0';
    });
    saveAll();
  }

  window.onload = loadAll;
</script>
</body>
</html>
