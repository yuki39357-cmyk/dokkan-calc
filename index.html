<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドッカンバトル 計算機</title>
  <link rel="icon" href="dokkan-favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="dokkan-favicon.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #f0f0f0;
      color: #222;
      font-size: 13px;
      padding: 4px;
    }
    .header-row { display: flex; align-items: center; justify-content: space-between; padding: 2px 0 3px; }
    h1 { font-size: 0.95em; color: #c00; font-weight: bold; }
    .tabs { display: flex; gap: 3px; }
    .tab {
      padding: 2px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #e8e8e8;
      font-size: 0.8em;
      font-weight: bold;
      color: #666;
      cursor: pointer;
      white-space: nowrap;
    }
    .guard-toggle { display: flex; gap: 3px; }
    .gtoggle {
      flex: 1;
      padding: 1px 0;
      border: 1px solid #ccc;
      border-radius: 3px;
      background: #e8e8e8;
      font-size: 16px;
      font-weight: bold;
      color: #666;
      cursor: pointer;
    }
    .gtoggle.active { background: #006cc7; color: #fff; border-color: #006cc7; }
    .tab.active { background: #c00; color: #fff; border-color: #c00; }
    .container { max-width: 480px; margin: 0 auto; }

    section {
      display: flex;
      gap: 4px;
      background: #fff;
      border-radius: 5px;
      padding: 3px 7px 3px 4px;
      margin-bottom: 3px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }
    .sec-title {
      writing-mode: vertical-rl;
      font-size: 0.85em;
      color: #fff;
      background: #222;
      font-weight: bold;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.05em;
      border-radius: 3px;
      padding: 4px 2px;
    }
    .sec-body { flex: 1; min-width: 0; }
    .sep { border: none; border-top: 1px dashed #ddd; margin: 2px 0; }

    .r2 {
      display: grid;
      grid-template-columns: 1fr 72px 72px;
      align-items: center;
      gap: 3px;
      margin-bottom: 1px;
    }
    .r1 {
      display: grid;
      grid-template-columns: 1fr 110px;
      align-items: center;
      gap: 3px;
      margin-bottom: 1px;
    }
    .r2 label, .r1 label {
      font-size: 0.76em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    input[type="text"], select {
      width: 100%;
      padding: 1px 3px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: 16px;
      text-align: right;
      background: #fff;
      appearance: none;
      -webkit-appearance: none;
    }
    select { text-align: center; cursor: pointer; }

    /* ATK/DEF 色分け */
    input.ai, select.ai { background: #fff5f5; border-color: #f5aaaa; }
    input.di, select.di { background: #f0f5ff; border-color: #aaaaf5; }

    .no-def {
      border: 1px solid #eee;
      border-radius: 3px;
      background: #fafafa;
      color: #ccc;
      font-size: 0.75em;
      text-align: center;
      padding: 1px 0;
    }

    /* 必殺技効果ブロック：ラベルと入力行を横並び */
    .eff-block { display: flex; align-items: flex-start; gap: 5px; }
    .eff-title { font-size: 0.72em; color: #555; white-space: nowrap; padding-top: 3px; flex-shrink: 0; }
    .eff-rows { flex: 1; }
    .r-eff {
      display: grid;
      grid-template-columns: auto 56px 56px 14px 36px 18px;
      align-items: center;
      gap: 3px;
      margin-bottom: 1px;
    }
    .r-eff label { font-size: 0.76em; white-space: nowrap; }

    button#resetBtn {
      display: block; width: 100%; margin-top: 3px;
      padding: 6px;
      background: #888; color: #fff; border: none;
      border-radius: 5px; font-size: 0.85em; font-weight: bold;
      cursor: pointer;
    }
    button#resetBtn:active { background: #555; }

    #result { display: flex; gap: 4px; background: #fff; border-radius: 5px; padding: 3px 7px 5px 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
    #result .sec-title { background: #c00; }
    .result-body { flex: 1; min-width: 0; }
    #resultPosBtn {
      font-size: 0.7em;
      color: #aaa;
      background: none;
      border: 1px solid #ddd;
      border-radius: 3px;
      padding: 1px 6px;
      cursor: pointer;
    }
    .tab-help { background: #444; border-color: #444; color: #fff; }
    .tab-help:active { background: #222; }
    #helpModal { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; }
    #helpOverlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); }
    #helpBox {
      position: relative; z-index: 1;
      background: #fff; border-radius: 8px;
      width: 92%; max-width: 460px; max-height: 82vh;
      overflow-y: auto; padding: 12px 14px;
      font-size: 0.9em; line-height: 1.6;
    }
    #helpBox h3 { font-size: 1em; color: #c00; margin: 12px 0 4px; border-bottom: 1px solid #eee; padding-bottom: 2px; }
    #helpBox h3:first-child { margin-top: 0; }
    #helpBox p { margin: 4px 0; color: #333; }
    #helpBox ul { margin: 4px 0 4px 16px; color: #333; }
    #helpCloseBtn {
      display: block; width: 100%; margin-top: 14px;
      padding: 7px; background: #888; color: #fff;
      border: none; border-radius: 5px; font-size: 0.9em;
      font-weight: bold; cursor: pointer;
    }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; margin-top: 3px; }
    .result-item { background: #f9f9f9; border-radius: 4px; padding: 3px 5px; }
    .result-label { font-size: 0.6em; color: #777; margin-bottom: 0; }
    .result-value { font-size: 1.2em; font-weight: bold; }
    .result-value.atk { color: #c00; }
    .result-value.def { color: #006cc7; }
  </style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <h1>ドッカンバトル 計算機</h1>
    <div class="tabs">
      <button class="tab active" onclick="switchTab(0)">タブ1</button>
      <button class="tab" onclick="switchTab(1)">タブ2</button>
      <button class="tab" onclick="switchTab(2)">タブ3</button>
      <button class="tab tab-help" onclick="openHelp()">使い方</button>
    </div>
  </div>

  <!-- 基礎 + リーダー -->
  <section>
    <span class="sec-title">基礎・リーダー</span>
    <div class="sec-body">
      <div class="r2" style="margin-bottom:1px;">
        <span></span>
        <span style="font-size:0.68em;color:#c77;text-align:center;font-weight:bold;">ATK</span>
        <span style="font-size:0.68em;color:#77c;text-align:center;font-weight:bold;">DEF</span>
      </div>
      <div class="r2"><label>基礎</label>
        <input type="text" inputmode="numeric" id="baseAtk" class="ai">
        <input type="text" inputmode="numeric" id="baseDef" class="di">
      </div>
      <div class="r2"><label>潜在</label>
        <input type="text" inputmode="numeric" id="potAtk" class="ai">
        <input type="text" inputmode="numeric" id="potDef" class="di">
      </div>
      <div class="r2"><label>スキル玉</label>
        <input type="text" inputmode="numeric" id="ballAtk" class="ai">
        <input type="text" inputmode="numeric" id="ballDef" class="di">
      </div>
      <hr class="sep">
      <div class="r2"><label>自リーダー</label>
        <select id="leaderAtk" class="ai"><option value="220" selected>220</option><option value="200">200</option><option value="170">170</option></select>
        <select id="leaderDef" class="di"><option value="220" selected>220</option><option value="200">200</option><option value="170">170</option></select>
      </div>
      <div class="r2"><label>フレンド</label>
        <select id="friendAtk" class="ai"><option value="220" selected>220</option><option value="200">200</option><option value="170">170</option></select>
        <select id="friendDef" class="di"><option value="220" selected>220</option><option value="200">200</option><option value="170">170</option></select>
      </div>
    </div>
  </section>

  <!-- パッシブ -->
  <section>
    <span class="sec-title">パッシブ</span>
    <div class="sec-body">
      <div class="r2"><label>A①</label>
        <input type="text" inputmode="numeric" id="passA1Atk" class="ai">
        <input type="text" inputmode="numeric" id="passA1Def" class="di">
      </div>
      <div class="r2"><label>A②</label>
        <input type="text" inputmode="numeric" id="passA2Atk" class="ai">
        <input type="text" inputmode="numeric" id="passA2Def" class="di">
      </div>
      <div class="r2"><label>サポート</label>
        <input type="text" inputmode="numeric" id="suppAtk" class="ai">
        <input type="text" inputmode="numeric" id="suppDef" class="di">
      </div>
      <hr class="sep">
      <div class="r2"><label>被弾時</label>
        <input type="text" inputmode="numeric" id="hitAtk" class="ai">
        <input type="text" inputmode="numeric" id="hitDef" class="di">
      </div>
      <div class="r2"><label>B①</label>
        <input type="text" inputmode="numeric" id="passBAtk1" class="ai">
        <input type="text" inputmode="numeric" id="passBDef1" class="di">
      </div>
      <div class="r2"><label>B②</label>
        <input type="text" inputmode="numeric" id="passBAtk2" class="ai">
        <input type="text" inputmode="numeric" id="passBDef2" class="di">
      </div>
    </div>
  </section>

  <!-- その他補正 -->
  <section>
    <span class="sec-title">その他補正</span>
    <div class="sec-body">
      <div class="r2"><label>リンク</label>
        <input type="text" inputmode="numeric" id="linkAtk" class="ai">
        <input type="text" inputmode="numeric" id="linkDef" class="di">
      </div>
      <div class="r2"><label>アクティブ</label>
        <input type="text" inputmode="numeric" id="activeAtk" class="ai">
        <input type="text" inputmode="numeric" id="activeDef" class="di">
      </div>
      <div class="r2"><label>フィールド</label>
        <input type="text" inputmode="numeric" id="fieldAtk" class="ai">
        <input type="text" inputmode="numeric" id="fieldDef" class="di">
      </div>
      <div class="r2"><label>サポートメモリー</label>
        <input type="text" inputmode="numeric" id="memAtk" class="ai">
        <input type="text" inputmode="numeric" id="memDef" class="di">
      </div>
      <div class="r2"><label>アイテム</label>
        <input type="text" inputmode="numeric" id="itemAtk" class="ai">
        <input type="text" inputmode="numeric" id="itemDef" class="di">
      </div>
    </div>
  </section>

  <!-- 必殺技 + DEF関連 -->
  <section>
    <span class="sec-title">必殺技</span>
    <div class="sec-body">
    <div class="r1"><label>気力補正</label>
      <select id="kiBonus">
        <option value="2" selected>×2.0（LR24）</option>
        <option value="1.8">×1.8</option>
        <option value="1.7">×1.7</option>
        <option value="1.6">×1.6</option>
        <option value="1.5">×1.5（UR12）</option>
        <option value="1.4">×1.4</option>
        <option value="1.3">×1.3</option>
      </select>
    </div>
    <div class="r1" style="grid-template-columns: 1fr 170px;"><label>必殺技倍率</label>
      <select id="suprRate">
        <option value="8.4">8.4 究極lv20</option>
        <option value="6.3">6.3 超絶特大lv15</option>
        <option value="6.2">6.2 超極大lv25</option>
        <option value="5.7" selected>5.7 超極大lv20</option>
        <option value="5.05">5.05 超絶特大lv10</option>
        <option value="4.5">4.5 極大lv25</option>
        <option value="4.25">4.25 極大lv20</option>
      </select>
    </div>
    <hr class="sep">
    <div class="eff-block">
      <span class="eff-title">必殺技効果</span>
      <div class="eff-rows">
        <div class="r-eff">
          <label>①(無限上昇)</label>
          <input type="text" inputmode="numeric" id="suprEff1Pct" min="0" class="ai">
          <input type="text" inputmode="numeric" id="suprEff1DefPct" min="0" class="di">
          <span class="x-mark">×</span>
          <input type="text" inputmode="numeric" id="suprEff1Cnt" value="1" min="0">
          <span class="x-mark">回</span>
        </div>
        <div class="r-eff">
          <label>②(無限上昇)</label>
          <input type="text" inputmode="numeric" id="suprEff2Pct" min="0" class="ai">
          <input type="text" inputmode="numeric" id="suprEff2DefPct" min="0" class="di">
          <span class="x-mark">×</span>
          <input type="text" inputmode="numeric" id="suprEff2Cnt" value="1" min="0">
          <span class="x-mark">回</span>
        </div>
        <div class="r-eff">
          <label>③(1ターンのみ)</label>
          <input type="text" inputmode="numeric" id="suprEff3Pct" min="0" class="ai">
          <input type="text" inputmode="numeric" id="suprEff3DefPct" min="0" class="di">
          <span></span>
          <span class="no-def">—</span>
          <span></span>
        </div>
      </div>
    </div>
    <div class="r1"><label>必殺技威力UP</label>
      <input type="text" inputmode="numeric" id="suprPower" class="ai">
    </div>
    </div>
  </section>

  <div id="result">
    <span class="sec-title">計算結果</span>
    <div class="result-body">
    <div style="display:flex;justify-content:flex-end;margin-bottom:2px;">
      <button id="resultPosBtn" onclick="toggleResultPosition()">↑ 上へ</button>
    </div>
    <div class="result-grid">
      <div class="result-item" style="grid-column: 1 / -1;">
        <div class="result-label">必殺技ATK</div>
        <div class="result-value atk" id="resSuprAtk">---</div>
      </div>
      <div class="result-item">
        <div class="result-label">行動前DEF</div>
        <div class="result-value def" id="resEffDef">---</div>
      </div>
      <div class="result-item">
        <div class="result-label">行動後DEF</div>
        <div class="result-value def" id="resAftDef">---</div>
      </div>
    </div>
    <hr class="sep" style="margin-top:6px;">
    <div class="r1" style="margin-top:4px;"><label>軽減率 %</label>
      <input type="text" inputmode="numeric" id="mitigation" min="0" max="100">
    </div>
    <div class="r1"><label>全属性ガード</label>
      <div class="guard-toggle">
        <button class="gtoggle active" onclick="setGuard(0)">無</button>
        <button class="gtoggle" onclick="setGuard(1)">有</button>
        <input type="hidden" id="allGuard" value="0">
      </div>
    </div>
    <div class="result-grid" style="margin-top:5px;">
      <div class="result-item">
        <div class="result-label">完封ライン（行動前）</div>
        <div class="result-value def" id="resSealEff">---</div>
      </div>
      <div class="result-item">
        <div class="result-label">完封ライン（行動後）</div>
        <div class="result-value def" id="resSealAft">---</div>
      </div>
      <div class="result-item">
        <div class="result-label">50万耐えライン（行動前）</div>
        <div class="result-value def" id="resSeal50Eff">---</div>
      </div>
      <div class="result-item">
        <div class="result-label">50万耐えライン（行動後）</div>
        <div class="result-value def" id="resSeal50Aft">---</div>
      </div>
    </div>
    <button id="resetBtn" onclick="resetAll()">このタブをリセット</button>
    </div>
  </div>

</div>

<div id="helpModal" style="display:none;">
  <div id="helpOverlay" onclick="closeHelp()"></div>
  <div id="helpBox">
    <div id="helpContent">読み込み中...</div>
    <button id="helpCloseBtn" onclick="closeHelp()">閉じる</button>
  </div>
</div>

<script>
  function n(id) {
    return parseFloat(document.getElementById(id).value) || 0;
  }
  function fmt(num) {
    return Math.floor(num).toLocaleString('ja-JP');
  }

  const INPUT_IDS = [
    'baseAtk','baseDef','potAtk','potDef','ballAtk','ballDef',
    'leaderAtk','leaderDef','friendAtk','friendDef',
    'passA1Atk','passA1Def','passA2Atk','passA2Def','suppAtk','suppDef',
    'hitAtk','hitDef','passBAtk1','passBDef1','passBAtk2','passBDef2',
    'linkAtk','linkDef','activeAtk','activeDef',
    'fieldAtk','fieldDef','memAtk','memDef','itemAtk','itemDef',
    'kiBonus','suprRate',
    'suprEff1Pct','suprEff1Cnt','suprEff1DefPct',
    'suprEff2Pct','suprEff2Cnt','suprEff2DefPct',
    'suprEff3Pct','suprEff3DefPct',
    'suprPower',
    'mitigation','allGuard'
  ];

  const DEFAULTS = { suprRate: '5.7', kiBonus: '2', leaderAtk: '220', leaderDef: '220', friendAtk: '220', friendDef: '220', suprEff1Cnt: '1', suprEff2Cnt: '1', allGuard: '0' };

  let currentTab = 0;

  function saveAll() {
    const data = {};
    INPUT_IDS.forEach(id => { data[id] = document.getElementById(id).value; });
    localStorage.setItem(`dokkanCalc_${currentTab}`, JSON.stringify(data));
  }

  function loadAll() {
    try {
      const saved = localStorage.getItem(`dokkanCalc_${currentTab}`);
      const data = saved ? JSON.parse(saved) : {};
      INPUT_IDS.forEach(id => {
        document.getElementById(id).value = data[id] !== undefined ? data[id] : (DEFAULTS[id] ?? '');
      });
    } catch(e) {}
  }

  function switchTab(n) {
    saveAll();
    currentTab = n;
    localStorage.setItem('dokkanCalcTab', n);
    document.querySelectorAll('.tab').forEach((btn, i) => btn.classList.toggle('active', i === n));
    loadAll();
    syncGuardButtons();
    calc();
  }

  function openHelp() {
    document.getElementById('helpModal').style.display = 'flex';
    fetch('help.html')
      .then(r => r.text())
      .then(html => { document.getElementById('helpContent').innerHTML = html; })
      .catch(() => { document.getElementById('helpContent').textContent = '読み込みに失敗しました'; });
  }

  function closeHelp() {
    document.getElementById('helpModal').style.display = 'none';
  }

  function toggleResultPosition() {
    const container = document.querySelector('.container');
    const result = document.getElementById('result');
    const headerRow = document.querySelector('.header-row');
    const isTop = result.previousElementSibling === headerRow;
    if (isTop) {
      container.appendChild(result);
      document.getElementById('resultPosBtn').textContent = '↑ 上へ';
      localStorage.setItem('dokkanCalcResultPos', 'bottom');
    } else {
      headerRow.insertAdjacentElement('afterend', result);
      document.getElementById('resultPosBtn').textContent = '↓ 下へ';
      localStorage.setItem('dokkanCalcResultPos', 'top');
    }
  }

  function restoreResultPosition() {
    if (localStorage.getItem('dokkanCalcResultPos') === 'top') {
      const headerRow = document.querySelector('.header-row');
      headerRow.insertAdjacentElement('afterend', document.getElementById('result'));
      document.getElementById('resultPosBtn').textContent = '↓ 下へ';
    }
  }

  function setGuard(val) {
    document.getElementById('allGuard').value = val;
    document.querySelectorAll('.gtoggle').forEach((btn, i) => btn.classList.toggle('active', i === val));
    saveAll();
    calc();
  }

  function syncGuardButtons() {
    const val = parseInt(document.getElementById('allGuard').value || '0');
    document.querySelectorAll('.gtoggle').forEach((btn, i) => btn.classList.toggle('active', i === val));
  }

  INPUT_IDS.forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input',  () => { saveAll(); calc(); });
    el.addEventListener('change', () => { saveAll(); calc(); });
    if (el.tagName === 'INPUT') {
      el.addEventListener('focus', () => {
        setTimeout(() => {
          const len = el.value.length;
          el.setSelectionRange(len, len);
        }, 0);
      });
    }
  });

  function calc() {
    const fl = Math.floor;

    // ①ステータス値
    let atk    = fl(n('baseAtk') + n('potAtk') + n('baseAtk') * n('ballAtk') / 100);
    let defBase = fl(n('baseDef') + n('potDef') + n('baseDef') * n('ballDef') / 100);

    // ②リーダースキル
    atk    = fl(atk    * (1 + n('leaderAtk') / 100 + n('friendAtk') / 100));
    defBase = fl(defBase * (1 + n('leaderDef') / 100 + n('friendDef') / 100));

    // ③フィールド効果
    atk    = fl(atk    * (1 + n('fieldAtk') / 100));
    defBase = fl(defBase * (1 + n('fieldDef') / 100));

    // ④パッシブスキル（A系とB系を別乗算、DEFはここで行動前/後に分岐）
    atk = fl(atk * (1 + n('passA1Atk') / 100 + n('passA2Atk') / 100 + n('suppAtk') / 100));
    atk = fl(atk * (1 + n('hitAtk') / 100 + n('passBAtk1') / 100 + n('passBAtk2') / 100));
    let defEff = fl(defBase * (1 + n('passA1Def') / 100 + n('passA2Def') / 100 + n('suppDef') / 100));
    defEff = fl(defEff * (1 + n('hitDef') / 100));
    let defAft = fl(defBase * (1 + n('passA1Def') / 100 + n('passA2Def') / 100 + n('suppDef') / 100));
    defAft = fl(defAft * (1 + n('hitDef') / 100 + n('passBDef1') / 100 + n('passBDef2') / 100));

    // ⑤サポートメモリー＆アイテム
    atk    = fl(atk    * (1 + (n('memAtk') + n('itemAtk')) / 100));
    defEff = fl(defEff * (1 + (n('memDef') + n('itemDef')) / 100));
    defAft = fl(defAft * (1 + (n('memDef') + n('itemDef')) / 100));

    // ⑥アクティブスキル
    atk    = fl(atk    * (1 + n('activeAtk') / 100));
    defEff = fl(defEff * (1 + n('activeDef') / 100));
    defAft = fl(defAft * (1 + n('activeDef') / 100));

    // ⑦リンクスキル
    atk    = fl(atk    * (1 + n('linkAtk') / 100));
    defEff = fl(defEff * (1 + n('linkDef') / 100));
    defAft = fl(defAft * (1 + n('linkDef') / 100));

    // ⑧気力ボーナス（ATKのみ）
    const kiBonusMult = parseFloat(document.getElementById('kiBonus').value) || 1;
    atk = fl(atk * kiBonusMult);

    // ⑨必殺技＆追加効果（四捨五入）
    const effAtkTotal = n('suprEff1Pct') * n('suprEff1Cnt')
                      + n('suprEff2Pct') * n('suprEff2Cnt')
                      + n('suprEff3Pct');
    const suprRate = parseFloat(document.getElementById('suprRate').value) || 1;
    const suprAtk = Math.round(atk * (suprRate + effAtkTotal / 100 + n('suprPower') * 0.05));

    const effDef12  = n('suprEff1DefPct') * n('suprEff1Cnt') + n('suprEff2DefPct') * n('suprEff2Cnt');
    const effDef123 = effDef12 + n('suprEff3DefPct');
    const effDef = Math.round(defEff * (1 + effDef12  / 100));
    const aftDef = Math.round(defAft * (1 + effDef123 / 100));

    const mit = 1 - n('mitigation') / 100;
    const hasGuard = document.getElementById('allGuard').value === '1';

    function calcSeal(def, dmg) {
      if (mit <= 0) return Infinity;
      return hasGuard ? (def + dmg * 2) / (0.8 * mit) : (def + dmg) / mit;
    }
    const sealEff   = calcSeal(effDef, 0);
    const sealAft   = calcSeal(aftDef, 0);
    const seal50Eff = calcSeal(effDef, 500000);
    const seal50Aft = calcSeal(aftDef, 500000);

    document.getElementById('resSuprAtk').textContent   = fmt(suprAtk);
    document.getElementById('resEffDef').textContent    = fmt(effDef);
    document.getElementById('resAftDef').textContent    = fmt(aftDef);
    document.getElementById('resSealEff').textContent   = sealEff   === Infinity ? '∞' : fmt(sealEff);
    document.getElementById('resSealAft').textContent   = sealAft   === Infinity ? '∞' : fmt(sealAft);
    document.getElementById('resSeal50Eff').textContent = seal50Eff === Infinity ? '∞' : fmt(seal50Eff);
    document.getElementById('resSeal50Aft').textContent = seal50Aft === Infinity ? '∞' : fmt(seal50Aft);
  }

  function resetAll() {
    if (!confirm('すべての入力値をリセットしますか？')) return;
    INPUT_IDS.forEach(id => {
      document.getElementById(id).value = DEFAULTS[id] ?? '';
    });
    saveAll();
    calc();
  }

  window.onload = () => {
    // 旧データを移行
    const old = localStorage.getItem('dokkanCalc');
    if (old && !localStorage.getItem('dokkanCalc_0')) {
      localStorage.setItem('dokkanCalc_0', old);
    }
    currentTab = parseInt(localStorage.getItem('dokkanCalcTab') || '0');
    document.querySelectorAll('.tab').forEach((btn, i) => {
      btn.classList.toggle('active', i === currentTab);
    });
    restoreResultPosition();
    loadAll();
    syncGuardButtons();
    calc();
  };
</script>
</body>
</html>
